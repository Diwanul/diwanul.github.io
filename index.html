<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Yifan Hu - Homepage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="css/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <table style="width:100%;max-width:1000px;border:0px;border-spacing:0px;border-collapse:separate;margin:0 auto;padding:0;">
    <tbody>
      <tr>
        <td style="padding:0;width:100%;vertical-align:top">
          
          <!-- Header and Bio Section -->
          <table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin:0 auto;padding:0;">
            <tbody>
              <tr>
                <td style="padding:2.5%;width:63%;vertical-align:middle">
                  <p style="text-align:center">
                    <name id="profile-name">Yifan Hu</name>
                  </p>
                  <p id="profile-bio">
                    Loading bio...
                  </p>
                  <p style="text-align:center">
                    <a id="link-email" href="mailto:yfhu25@stu.pku.edu.cn">✉️ Email</a> &nbsp;/&nbsp;
                    <a id="link-scholar" href="https://scholar.google.com/citations?user=_vJT64QAAAAJ">🎓 Scholar</a> &nbsp;/&nbsp;
                    <a id="link-github" href="https://github.com/Diwanul">💻 Github</a>
                  </p>
                </td>
                <td style="padding:2.5%;width:40%;max-width:40%">
                  <!-- Place your profile photo in an 'images' folder and link it here -->
                  <a href="images/profile.jpg"><img style="width:100%;max-width:100%;border-radius: 50%;" alt="profile photo" src="images/profile.jpg"></a>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- News Section -->
          <table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin:0 auto;padding:0;">
            <tbody>
              <tr>
                <td style="padding:2.5%;width:100%;vertical-align:middle">
                  <heading>📰 News</heading>
                  <ul id="news-list" style="max-height: 200px; overflow-y: auto;">
                    <li>Loading news...</li>
                  </ul>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- Publications Section -->
          <table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin:0 auto;padding:0;">
            <tbody>
              <tr>
                <td style="padding:2.5%;width:100%;vertical-align:middle">
                  <heading>📝 Publications</heading>
                  <div id="publications-list">
                    <p>Loading publications...</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
          
          <!-- Education Section -->
          <table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin:0 auto;padding:0;">
            <tbody>
              <tr>
                <td style="padding:2.5%;width:100%;vertical-align:middle">
                  <heading>🎓 Education</heading>
                  <ul id="education-list">
                    <li>Loading education...</li>
                  </ul>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- Footer -->
          <table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin:0 auto;padding:0;">
            <tbody>
              <tr>
                <td style="padding:2.5%;width:100%;vertical-align:middle;text-align:right;font-size:12px;color:#777;">
                  <p>
                    &copy; <span id="current-year"></span> Yifan Hu. Last updated: <span id="last-updated">Wait...</span>.
                    <br>
                    Design and source code inspired by <a href="https://jonbarron.info" style="color: #777;">Jon Barron's website</a>.
                    <br>
                    <a href="https://clustrmaps.com/site/1bz" title="Visit tracker"><img src="//www.clustrmaps.com/map_v2.png?d=0" style="display:none;" onerror="this.onerror=null; this.src='';"/></a>
                    <!-- Using a simpler badge for aesthetic -->
                    <img src="https://komarev.com/ghpvc/?username=Diwanul&label=Visitors&color=blue&style=flat" alt="Profile views" style="vertical-align: middle; margin-top: 5px;">
                  </p>
                </td>
              </tr>
            </tbody>
          </table>

        </td>
      </tr>
    </tbody>
  </table>

  <!-- Script to load publications from JSON generated by GitHub Actions -->
  <script>
    $(document).ready(function() {
      // Set Copyright Year dynamically
      $("#current-year").text(new Date().getFullYear());

      // Fetch the last commit date from Github API for 'Last Updated'
      $.getJSON("https://api.github.com/repos/Diwanul/diwanul.github.io/commits?per_page=1", function(data) {
        if(data && data.length > 0) {
          var commitDate = new Date(data[0].commit.author.date);
          var dateOptions = { year: 'numeric', month: 'short', day: 'numeric' };
          $("#last-updated").text(commitDate.toLocaleDateString("en-US", dateOptions));
        }
      });

      // Load and Render Profile Config
      $.getJSON("data/profile.json", function(data) {
        $("#profile-name").text(data.name);
        $("title").text(data.name + " - Homepage");
        $("#profile-bio").html(data.bio);
        $("#link-email").attr("href", "mailto:" + data.email);
        $("#link-scholar").attr("href", data.scholar_link);
        $("#link-github").attr("href", data.github_link);

        var $eduList = $("#education-list");
        $eduList.empty();
        $.each(data.education, function(index, item) {
          var imgHtml = item.image ? '<img src="' + item.image + '" style="height: 40px; vertical-align: middle; margin-right: 15px;">' : '';
          var uniText = item.link ? '<a href="' + item.link + '">' + item.university + '</a>' : item.university;
          var liHtml = '<li style="display: flex; align-items: center; margin-bottom: 10px;">' + 
                         imgHtml +
                         '<div><strong>' + item.degree + '</strong>, ' + item.time + '<br>' + uniText + '</div>' + 
                       '</li>';
          $eduList.append(liHtml);
        });
      });

      // Load and Render News
      $.getJSON("data/news.json", function(data) {
        var $newsList = $("#news-list");
        $newsList.empty(); // Clear loading text

        $.each(data, function(index, item) {
          var liHtml = '<li>' + item.content + '</li>';
          $newsList.append(liHtml);
        });
      }).fail(function() {
        $("#news-list").html("<li>Unable to load news data.</li>");
      });

      // Load and Render Publications
      $.getJSON("data/publications.json", function(data) {
        var $pubList = $("#publications-list");
        $pubList.empty(); // Clear loading text

        $.each(data, function(index, item) {
          var formattedAuthors = item.authors;
          // Highlight user's name dynamically:
          formattedAuthors = formattedAuthors.replace(/Yifan Hu/g, "<strong>Yifan Hu</strong>")
                                             .replace(/Y Hu/g, "<strong>Y Hu</strong>");

          var imgHtml = item.image ? '<td style="padding: 10px; width: 25%; max-width: 25%; vertical-align: middle;"><img src="' + item.image + '" style="width: 100%; border-radius: 4px;"></td>' : '';
          var infoStyle = item.image ? 'padding: 10px; width: 75%; vertical-align: top;' : 'padding: 10px; width: 100%; vertical-align: top;';

          var pubHtml = '<table style="width:100%;border:0px;border-spacing:0px;border-collapse:separate;margin:0 0 10px 0;"><tbody><tr>' +
                          imgHtml +
                          '<td style="' + infoStyle + '">' +
                            '<strong>' + item.title + '</strong><br>' +
                            formattedAuthors + '<br>' +
                            '<em>' + item.venue + '</em><br>';

          if(item.url) {
             pubHtml += '<a href="' + item.url + '" target="_blank" style="font-size: 14px;">[Paper]</a> ';
          }
          if(item.project) {
             pubHtml += '<a href="' + item.project + '" target="_blank" style="font-size: 14px;">[Project]</a> ';
          }
          if(item.code) {
             pubHtml += '<a href="' + item.code + '" target="_blank" style="font-size: 14px;">[Code]</a> ';
          }
          if(item.pdf) {
             pubHtml += '<a href="' + item.pdf + '" target="_blank" style="font-size: 14px;">[PDF]</a> ';
          }
                        
          pubHtml += '</td></tr></tbody></table>';
          $pubList.append(pubHtml);
        });
      }).fail(function() {
        $("#publications-list").html("<p>Unable to load publication data.</p>");
      });
    });
  </script>
</body>
</html>
